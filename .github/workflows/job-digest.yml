name: Daily Job Digest

# 6:00 AM America/Los_Angeles. GitHub cron is UTC and does NOT observe DST,
# so we run at BOTH 13:00 UTC (= 6am PDT, summer) and 14:00 UTC (= 6am PST, winter).
# The guard step makes sure only the correct one for the current PT date sends.
on:
  schedule:
    - cron: "0 13 * * *"   # 6am PDT (Mar-Nov)
    - cron: "0 14 * * *"   # 6am PST (Nov-Mar)
  workflow_dispatch: {}      # manual "Run workflow" button

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      # Runs at the default workspace (no repo needed yet) — just checks the clock.
      - name: Only proceed if it is actually 6am Pacific
        id: gate
        run: |
          HOUR_PT=$(TZ="America/Los_Angeles" date +%H)
          echo "Pacific hour is $HOUR_PT"
          # workflow_dispatch (manual) always proceeds; scheduled runs honor the DST guard.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$HOUR_PT" != "06" ]; then
            echo "Not 6am PT (DST guard) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install uv
        if: steps.gate.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Python + deps
        if: steps.gate.outputs.skip != 'true'
        working-directory: signalrank/backend
        run: uv sync

      - name: Run digest
        if: steps.gate.outputs.skip != 'true'
        working-directory: signalrank/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}/signalrank/backend
        run: uv run python -m jobdigest.run_digest