name: Daily Job Digest (Adya)

# Target: 7am America/Los_Angeles. Same approach as the main digest — the once-per-day
# DB guard (tag="adya") makes this send at most once per day even if GitHub fires late.
on:
  schedule:
    - cron: "0 14 * * *"   # ~7am PDT
    - cron: "0 15 * * *"   # ~7am PST / fallback
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python + deps
        working-directory: signalrank/backend
        run: uv sync
      - name: Run digest (Adya config)
        working-directory: signalrank/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}/signalrank/backend
        run: uv run python -m jobdigest.run_digest --config jobdigest/adya.yaml