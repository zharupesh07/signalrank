# Legacy default Railway config.
# Prefer per-service config files in Railway Service Settings:
# - API service: /signalrank/backend/railway.api.toml
# - Worker service: /signalrank/backend/railway.worker.toml

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

[[services]]
name = "signalrank-backend"
