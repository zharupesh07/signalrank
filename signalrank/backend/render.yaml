services:
  - type: web
    name: signalrank-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    startCommand: alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SCRAPER_DEFAULT_COUNTRY
        value: India
      - key: LINKEDIN_MAX_QUERIES
        value: "0"
