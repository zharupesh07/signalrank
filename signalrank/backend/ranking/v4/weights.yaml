# V4 feature weights. negative_hits must be negative (penalizes avoid terms).
# Per-lane overrides replace (not add to) the default for that feature.
# semantic_similarity weight is reduced in specialist lanes where keyword
# matching is more reliable than embedding proximity.

defaults:
  semantic_similarity: 0.14
  title_similarity: 0.18
  role_shape_match: 0.16
  skill_overlap: 0.14
  must_have_hits: 0.16
  role_family_match: 0.08
  company_tier_score: 0.05
  seniority_match: 0.10
  recency_score: 0.05
  negative_hits: -0.42
  location_match: 0.12
  description_role_family_terms: 0.04
  description_quality: 0.02
  source_quality: 0.03
  ingest_freshness: 0.01

