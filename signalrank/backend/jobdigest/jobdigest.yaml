# Companies to exclude (e.g. current employer)
exclude_companies:
  - Qualcomm

search:
  country: USA
  sites: [linkedin]
  remote: true
  hours_old: 24

filters:
  exclude_work_auth: [citizen_required, clearance_required, itar_us_person]
  seniority:
    sweet_spot: [3, 6]
    bands: [mid, senior]          # mid + senior; drop junior/new-grad and staff+
    hard_exclude_min_years: 8

scoring:
  shortlist_per_profile: 28
  provider: anthropic
  model: claude-haiku-4-5-20251001

digest:
  group_by: domain
  routing: combined
  top_n: 25
  send_hour_local: 6
  timezone: America/Los_Angeles