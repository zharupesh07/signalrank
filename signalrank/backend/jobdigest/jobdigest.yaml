# JobDigest — non-secret configuration.
# Secrets (DB URL, OpenRouter key, Gmail) live in env / GitHub Secrets, never here.
# Add a resume or recipient by editing this file — no code changes needed.

profiles:
  - id: rtl
    resume: resumes/rtl.pdf
    titles: ["Clock Design Engineer", "RTL Clock Controller", "ASIC Clock", "CDC Engineer"]
  - id: timing
    resume: resumes/timing.pdf
    titles: ["Physical Design Engineer", "STA Engineer", "Timing Closure", "DDR SerDes Timing"]

recipients:
  - zharupesh07@gmail.com

search:
  country: USA
  sites: [linkedin, google]
  remote: true
  hours_old: 24

