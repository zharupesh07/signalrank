# JobDigest config — Adya (software / distributed systems). Separate from rtl/timing.
profiles:
  - id: adya
    resume: resumes/adya.pdf
    titles: ["Senior Software Engineer", "Backend Engineer", "Distributed Systems Engineer",
             "Full Stack Engineer", "Platform Engineer", "Cloud Engineer",
             "Software Engineer", "Software Development Engineer"]

recipients:
  - adyawork23@gmail.com

exclude_companies: []

search:
  country: USA
  sites: [linkedin]
  remote: true
  hours_old: 30

filters:
  exclude_work_auth: [citizen_required, clearance_required, itar_us_person]
  seniority:
