# ============================================================
# SKILLS
# ============================================================
skills:
  equivalence_groups: {}

# ============================================================
# SCRAPING
# ============================================================
scraping:
  country: India
  max_results: 3000
  min_description_length: 0
  use_multiprocessing: true
  supports_hours_old: true

  # Set jobspy_only: true to disable ALL sources except JobSpy/Indeed.
  # Queries run sequentially (one at a time) with a small delay to avoid 403s.
  # Useful for testing, debugging, or when RapidAPI keys are unavailable.
  # jobspy_only: true  → only JobSpy/Indeed, no RapidAPI, no free APIs
  # jobspy_only: false → all sources (RapidAPI + JobSpy + free APIs)
  # RapidAPI is disabled by default until subscriptions are active.
  jobspy_only: true

  # Google Jobs scraper (Phase 4)
  # Works from residential IPs (laptop) without proxy.
  # On servers/Docker: set proxy to a residential proxy.
  google_jobs:
    enabled: true
    results_per_query: 50
    delay: 2.0
    # Backend priority:
    #   1. SerpAPI (reliable, any IP)  → set SERPAPI_KEY in .env  https://serpapi.com (100 free/month)
    #   2. JobSpy Google (fallback, unreliable — Google blocks most IPs now)
    #   3. Residential proxy (fallback) → set GOOGLE_JOBS_PROXY=user:pass@host:port
    proxy: null

  # Gmail Job Alerts (read-only IMAP)
  # Reads Google Job Alert emails from your Gmail label.
  # Setup: enable IMAP in Gmail + create App Password (see SETUP.md)
  # Then add GMAIL_USER + GMAIL_APP_PASSWORD to .env and set enabled: true
  gmail_alerts:
    enabled: false
    days_back: 7       # how many days of emails to read
    max_emails: 20     # max alert emails to parse per run

  sites:
    enabled:
      - indeed
      - linkedin

# ============================================================
# ROLE TAXONOMY
# ============================================================
functional_role_terms:
  ai: []
  devops: []
  security: []

functional_role_taxonomy:
  architecture_strategy:
    keywords:
      - enterprise architect
      - platform architect
      - solution architect
      - solutions architect
      - field solutions architect
  customer_facing:
    keywords:
      - solutions engineer
      - pre-sales
      - sales engineer
      - customer engineer
      - field solutions
      - forward deployed engineer
      - forward deployed

functional_role_thresholds:
  security_min_terms: 2
  agentic_min_terms: 3
  mlops_ai_terms: 1
  mlops_devops_terms: 1
  platform_devops_min_terms: 2

# ============================================================
# RESUME
# ============================================================
resume:
  distillation:
    enabled: false

# ============================================================
# TIMEOUTS (seconds)
# ============================================================
timeouts:
  scraper_per_source: 300
  scraper_total: 900
  llm_request: 90
  llm_probe: 10
  embedding_task: 600
  resume_compile: 30
  url_validation: 10
  recruiter_search: 20
  smtp_verify: 10
  rapidapi: 30
  google_jobs: 180
  free_api: 30
  jobspy_linkedin: 120
  jobspy_default: 300
  onboarding_parse: 60

# ============================================================
# RETRY / CONCURRENCY
# ============================================================
retry:
  llm_per_model: 3
  embed_max: 3
  embed_backoff_base: 2
  resume_task_max: 3
  archival_task_max: 3
  recruiter_max: 3

concurrency:
  llm_semaphore: 3
  rapidapi_semaphore: 4
  worker_queue_size: 100
  agentic_llm_semaphore: 2

# ============================================================
# CACHING
# ============================================================
caching:
  llm_response_ttl: 86400
  llm_probe_ttl: 3600
  vector_cache_max: 1000
  recruiter_cache_days: 3

# ============================================================
# BATCH SIZING
# ============================================================
batch:
  embed_chunk_size: 32
  rank_load_chunk: 500
  rank_embed_chunk: 32
  embed_batch_size: 8
  boot_embed_page_size: 512
  embedding_cache_query: 5000
  job_window_days: 15
  worker_poll_interval: 5
  pdf_fit_max_iterations: 5
