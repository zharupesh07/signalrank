# ============================================================
# Job Ranker v2 — BASE CONFIG (ENGINE ONLY)
# Deterministic, role-aware, persona-neutral
# ============================================================

version: 1

paths:
  db_path: duckdb

# --------------------
# EMBEDDINGS (ENGINE)
# --------------------
embeddings:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  device: cpu
  session_intra_op_threads: 4
  session_inter_op_threads: 1
  text:
    normalize_embeddings: true
    max_chars: 50000
    query_prefix: ""
    passage_prefix: ""

# --------------------
# RANKING MECHANICS (NEUTRAL)
# --------------------
ranking:
  min_semantic_score: 0.20
  enable_recency_decay: true
  recency_half_life_days: 21
  min_keyword_overlap: 0
  min_quality_multiplier: 0.0
  company_semantic_floor: 0.65
  hidden_gem_semantic_threshold: 0.70
  hidden_gem_company_bonus: 60
  contract_penalty: 0.9
  role_semantic_thresholds:
    software_general: 0.40
    platform_devops: 0.35
    agentic_systems: 0.35

  seniority_penalty:
    junior_multiplier: 0.4
    low_yoe_multiplier: 0.5
    over_senior_multiplier: 0.7
    title_keywords:
      junior:
        - intern
        - junior
        - entry
      over_senior:
        - director
        - head of
        - chief

  role_negative_keywords:
    software_general:
      - qa
      - tester
      - manual testing
      - support engineer
      - helpdesk
      - customer support
      - wordpress
      - shopify developer

    platform_devops:
      - qa
      - tester
      - frontend
      - react
      - angular
      - ui developer
      - wordpress
      - shopify developer

    agentic_systems:
      - qa
      - tester
      - data analyst
      - business analyst
      - power bi
      - tableau
      - excel heavy
      - reporting
      - dashboard
      - wordpress
      - shopify developer
  # ----------------------------------------------------------
  # SCORING WEIGHTS (additive model)
  # ----------------------------------------------------------
  scoring_weights:
    skills_match: 0.35
    title_relevance: 0.10
    company_fit: 0.15
    seniority: 0.15
    location: 0.15
    recency: 0.10

  title_relevance_floor: 0.25  # gate: jobs with title similarity below this are dropped
  title_relevance_low: 0.25    # linear map lower bound (→ score 0)
  title_relevance_high: 0.90   # linear map upper bound (→ score 100)
  company_title_relevance_floor: 0.50  # below this similarity, company score gets dampened

  # Neutral defaults — no role preference here
  functional_role_penalties:
    agentic_systems: 1.0
    mlops_llmops: 1.0
    platform_devops: 1.0
    software_general: 0.9

  # ----------------------------------------------------------
  # 4. HARD CAPS (upper bounds)
  # ----------------------------------------------------------
  caps:
    role_intent:
      customer_facing: 60
      architecture_strategy: 75

  # ----------------------------------------------------------
  # 5. LLM ADVISORY
  # ----------------------------------------------------------
  llm_veto:
    enabled: false
    model_max_tokens: 200
    penalty_multiplier: 0.65

  agentic_matching:
    enabled: true
    judge_top_n: 20
    verifier_top_n: 10
    max_judge_tokens: 1200
    max_verifier_tokens: 700
    rerank_enabled: true
    min_deterministic_score: 45
    strong_multiplier: 1.08
    adjacent_multiplier: 1.00
    weak_multiplier: 0.92
    misleading_multiplier: 0.78
    reject_multiplier: 0.55

  profile_title_rule_scoring:
    strong:
      semantic_floor: 0.56
      min_skill_overlap: 2
      multiplier: 0.72
    adjacent:
      semantic_floor: 0.50
      min_skill_overlap: 2
      multiplier: 0.88
      keep_semantic_floor: 0.58
      keep_role_skill_score: 1.12
    hybrid:
      semantic_floor: 0.52
      min_skill_overlap: 3
      multiplier: 0.82
      keep_semantic_floor: 0.60
      keep_role_skill_score: 1.15

