# ============================================================
# Calm-First Job Ranker — settings.yaml (v1)
# Single source of truth for ALL configuration.
# No constants should live outside this file.
# ============================================================

version: 1

# ============================================================
# PATHS & DIRECTORIES
# ============================================================
paths:
  project_root: .
  cache_dir: cache
  corpus_dir: corpus
  outputs_dir: outputs
  workspaces_dir: workspaces
  users_dir: users

# ============================================================
# USER / RESUME
# ============================================================
resume:
  # Default resume path used by scheduler / run_daily
  default_path: users/example/default/resume/resume.tex

  # Allowed formats and precedence
  allowed_formats:
    - pdf
    - tex

  # PDF parsing
  pdf:
    max_pages: 20

  # LaTeX cleanup rules
  latex:
    strip_comments: true
    collapse_whitespace: true

  embedding_prefix: >
      Agentic AI, LLM systems, inference, evaluation, orchestration.

  embedding:
    mode: prefix_plus_skills   # options: prefix_only | skills_only | prefix_plus_skills
    separator: " "

workspace:
  # Workspace path template
  # Available vars: {user}, {profile}
  template: "{workspaces_dir}/{user}/{profile}"

  # Persisted artifacts
  persist:
    distilled_resume: true
    resume_embedding: true

# ============================================================
# RANKING PIPELINE
# ============================================================
ranking:
  # --------------------------------------------------
  # Semantic similarity
  # --------------------------------------------------
  min_semantic_score: 0.15

  # Semantic floor BEFORE company boost (Scoring v2)
  semantic_company_floor: 0.65

  # --------------------------------------------------
  # Years-of-experience handling
  # --------------------------------------------------
  max_yoe_cap: 20
  yoe_penalty_threshold: 12
  yoe_mismatch_penalty: 0.6

  # --------------------------------------------------
  # Recency
  # --------------------------------------------------
  enable_recency_decay: true
  recency_half_life_days: 21

  # --------------------------------------------------
  # Job description quality
  # --------------------------------------------------
  job_desc_min_len: 500
  short_description_penalty: 0.85

  # --------------------------------------------------
  # Functional role penalties (Scoring v2)
  # --------------------------------------------------
  functional_role_penalties:
    agentic_systems: 1.0
    mlops_llmops: 1.0
    platform_devops: 0.9
    software_general: 0.85
    ux: 0.6
    product: 0.6
    customer_facing: 0.65

  # --------------------------------------------------
  # Skill overlap
  # --------------------------------------------------
  skill_overlap:
    enabled: true
    alpha: 0.1
    min_overlap: 1
    cap_multiplier: 1.15
    debug: true

  # --------------------------------------------------
  # Hard title filters
  # --------------------------------------------------
  hard_title_blocklist: []
    # - principal
    # - manager
    # - director
    # - head
    # - vp
    # - vice president
    # - intern
    # - junior
    # - graduate

  seniority_penalty:
    junior_multiplier: 0.4
    low_yoe_multiplier: 0.5
    title_keywords:
      junior:
        - associate
        - junior
        - entry
        - intern
  # ----------------------------------
  # LLM Relevance Veto (Post-Rank)
  # ----------------------------------
  llm_veto:
    enabled: true        # default OFF
    top_n: 20             # only inspect top N jobs
    model_max_tokens: 200
    hard_fail_on_error: false
    penalty_multiplier: 0.65

  # --------------------------------------------------
  # Functional Role Terms
  # --------------------------------------------------
functional_role_terms:
  ai:
    - llm
    - agent
    - agents
    - rag
    - embedding
    - prompt
    - inference
    - evaluation
    - orchestration
    - langchain
    - langgraph
    - vector
  devops:
    - kubernetes
    - terraform
    - ci/cd
    - pipeline
    - monitoring
    - grafana
    - prometheus
    - sre
    - availability
    - mttr
  security:
    - threat
    - siem
    - soc
    - incident
    - attack
    - mitre
    - edr
    - forensics
# ============================================================
# COMPANY SCORING
# ============================================================
company_scoring:
  tiers_file: config/company_tiers.yaml
  default_weight: 0.4

  # Hard preference overrides (applied before tier weights)
  preferred_companies:
    - unitedhealth
    - optum
    - roche
    - pfizer
    - abbvie
    - eli lilly
    - merck
    - philips
    - ge healthcare
    - siemens
    - walmart
    - ubs
    - visa
    - mastercard
    - capital one
    - intuit
    - workday
    - servicenow
    - atlassian
    - salesforce
    - adobe
    - blackrock
    - goldman sachs
    - microsoft
    - google
    - apple
    - msci

  # Canonical normalization / aliases
  aliases:
    uhg: unitedhealth
    united health group: unitedhealth
    eli lilly: eli lilly
    lilly: eli lilly
    ge healthineers: ge healthcare
    goldman: goldman sachs
    capitalone: capital one

# ============================================================
# PROFILES
# ============================================================
profiles:
  senior_ic:
    description: "Senior individual contributor roles. IC-only. Calm-first."

    skip_junior_roles: true
    skip_manager_roles: true

    exclude_keywords:
      - intern
      - junior
      - graduate
      # - manager
      # - principal
      # - director
      # - head
      - sales
      - marketing
      - hr
      - qa
      - test
      - quality
      - cybersecurity
      - soc
      - siem
      - forensics
      - educator
      - trainer

    deprioritized_companies:
      - amazon
      - uber
      - wipro
      - infosys
      - tcs
      - tata consultancy services
      - hcl
      - tech mahindra
      - cognizant
      - capgemini
      - ibm
      - epam
      - globallogic
      - nagarro
      - fractal

    llm:
      use_search_expansion: true
      use_skill_normalization: true
      use_match_explanations: true

# ============================================================
# EMBEDDINGS & FAISS
# ============================================================
embeddings:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  device: cpu

  text:
    max_chars: 2000
    normalize_embeddings: true

  faiss:
    index_file: jobs.faiss
    metadata_file: jobs_meta.json
    read_only_corpus: true



# ============================================================
# LLM
# ============================================================
llm:
  provider: openrouter
  api_key_env: OPENROUTER_API_KEY

  model_pool:
    - google/gemini-2.0-flash-exp:free
    - google/gemma-3-4b-it:free
    - mistralai/devstral-2512:free
    - google/gemini-2.5-flash-lite

  cache:
    enabled: true
    ttl_seconds: 86400

  rate_limits:
    max_concurrency: 2
    call_cooldown_seconds: 3.0

# ============================================================
# SCRAPING
# ============================================================
scraping:
  cache_ttl_hours: 6
  max_retries: 3
  base_backoff_seconds: 2.0
  jitter_range_seconds: [0.3, 1.5]

  min_description_length: 500
  use_multiprocessing: true
  volume:
    max_jobs_per_query: 500
    max_pages: 10
  sites:
    india:
      enabled:
        - indeed
        - glassdoor
        - linkedin
        - bayt
        - google
    global:
      enabled:
        - indeed
        - glassdoor
        - linkedin
        - google

  linkedin:
    sleep_seconds: 12
    max_pages: 8

  indeed:
    heartbeat_seconds: 15
  linkedin_api:
    enabled: true
    max_requests_per_minute: 30
    page_limit: 3
    timeout_seconds: 20
    max_results_per_query: 70
    sources:
      - active-jb-7d
      - active-ats-7d

# ============================================================
# CACHE POLICY
# ============================================================
cache:
  queries:
    max_files: 50
    max_age_hours: 72

  role_classification:
    ttl_days: 7

# ============================================================
# OUTPUTS & RETENTION
# ============================================================
outputs:
  ranked_jobs_file: ranked_jobs.csv
  ranked_corpus_file: ranked_corpus.csv
  preview_file: ranked_jobs_head.csv

  overwrite: true
  retain_previous_runs: false

  preview:
    enabled: true
    rows: 5
    drop_columns:
      - description
      - company_url
      - job_url
      - job_url_direct
      - company_logo

# ============================================================
# SCHEDULER / AUTOMATION
# ============================================================
scheduler:
  enabled: true
  check_interval_seconds: 86400
  stale_after_hours: 24

  auto_start_streamlit: true

  lockfile: outputs/.run.lock

# ============================================================
# LOGGING
# ============================================================
logging:
  level: INFO
  format: "[%(levelname)s] %(message)s"
  log_to_file: true
  log_file: job_ranker.log

# ============================================================
# ENVIRONMENT SAFETY (macOS / FAISS / TORCH)
# ============================================================
environment:
  omp_num_threads: 1
  mkl_num_threads: 1
  openblas_num_threads: 1
  veclib_maximum_threads: 1
  numexpr_num_threads: 1
  torch_num_threads: 1
  tokenizers_parallelism: false

# ============================================================
# USERS
# ============================================================
users:
  example:
    # Backward-compatible defaults
    default_profile: senior_ic
    default_use_case: default

    # Legacy single-user behavior (still valid)
    resume_path: users/Example_Candidate/resume.tex

    # New (optional, extensible)
    use_cases:
      default:
        description: "General ML / GenAI roles (legacy behavior)"
        resume_path: users/Example_Candidate/resume.tex
        profile: senior_ic

      ml:
        profile: senior_ic
        resume_path: users/Example_Candidate/resume.tex

# ============================================================
# SEARCH / QUERY PLANNING
# ============================================================
search:
  prompt: |
    Generate job search queries from this role intent.

    Rules:
    - One role per query
    - No OR operators
    - Suitable for job boards
    - Senior IC focused
    - Use standard industry titles only

    Return JSON:
    { "queries": [...] }

    ROLE:
    <<<TEXT>>>

  min_query_length: 6

  # Intentionally empty by default.
  # Must be provided via settings.override.yaml per use-case.
  anchors: []

  invalid_tokens: []

  normalization: {}

  persona_overrides:
    strategy:
      extra_queries:
        - enterprise architect
        - platform architect
        - principal architect
        - digital transformation architect

